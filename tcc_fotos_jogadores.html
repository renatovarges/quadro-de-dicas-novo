<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCC · Central de Fotos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap');
  :root{--verde:#00C853;--verde-escuro:#007E33;--preto:#0A0A0A;--cinza-escuro:#141414;--cinza-medio:#1E1E1E;--cinza-borda:#2A2A2A;--cinza-texto:#888;--branco:#F5F5F5}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--preto);color:var(--branco);font-family:'Inter',sans-serif;min-height:100vh}
  header{background:var(--cinza-escuro);border-bottom:2px solid var(--verde);padding:18px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
  .logo-tcc{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--verde);letter-spacing:3px;line-height:1}
  .logo-tcc span{color:var(--branco);font-size:13px;display:block;font-family:'Inter',sans-serif;font-weight:300;letter-spacing:1px;margin-top:2px}
  .header-sep{width:2px;height:36px;background:var(--cinza-borda);margin:0 8px}
  .search-wrapper{flex:1;max-width:480px;position:relative}
  .search-wrapper input{width:100%;background:var(--cinza-medio);border:1px solid var(--cinza-borda);border-radius:6px;padding:10px 44px 10px 16px;color:var(--branco);font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
  .search-wrapper input:focus{border-color:var(--verde)}
  .search-wrapper input::placeholder{color:var(--cinza-texto)}
  .search-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--cinza-texto);pointer-events:none;font-size:16px}
  .header-count{margin-left:auto;font-size:12px;color:var(--cinza-texto);white-space:nowrap}
  .header-count strong{color:var(--verde)}
  .clube-nav{background:var(--cinza-escuro);border-bottom:1px solid var(--cinza-borda);padding:0 32px;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
  .clube-nav::-webkit-scrollbar{display:none}
  .clube-btn{background:none;border:none;color:var(--cinza-texto);font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;padding:11px 12px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .2s,border-color .2s}
  .clube-btn:hover{color:var(--branco)}
  .clube-btn.ativo{color:var(--verde);border-bottom-color:var(--verde)}
  main{padding:28px 32px}
  .status-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
  .status-info{font-size:13px;color:var(--cinza-texto)}
  .status-info strong{color:var(--branco)}
  .btn-baixar-todos{background:var(--verde);color:var(--preto);border:none;border-radius:6px;padding:9px 20px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1.5px;cursor:pointer;transition:background .2s,transform .1s;display:flex;align-items:center;gap:8px}
  .btn-baixar-todos:hover{background:#00E060;transform:translateY(-1px)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px}
  .card{background:var(--cinza-medio);border:1px solid var(--cinza-borda);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .2s;position:relative}
  .card:hover{border-color:var(--verde);transform:translateY(-3px)}
  .card-img-wrap{width:100%;aspect-ratio:1;background:var(--cinza-escuro);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
  .card-img-wrap img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;transition:transform .3s}
  .card:hover .card-img-wrap img{transform:scale(1.05)}
  .card-clube-tag{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.75);color:var(--verde);font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1px;padding:2px 7px;border-radius:4px;backdrop-filter:blur(4px)}
  .card-overlay{position:absolute;inset:0;background:rgba(0,200,83,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;opacity:0;transition:opacity .2s}
  .card:hover .card-overlay{opacity:1}
  .card-overlay button{background:var(--preto);color:var(--verde);border:none;border-radius:5px;padding:7px 18px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;cursor:pointer;width:120px;transition:background .15s}
  .card-overlay button:hover{background:#111}
  .card-overlay .btn-copiar{color:var(--branco)}
  .card-info{padding:10px 12px;border-top:1px solid var(--cinza-borda)}
  .card-nome{font-size:12px;font-weight:600;color:var(--branco);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
  .card-clube{font-size:10px;color:var(--cinza-texto)}
  .empty{text-align:center;padding:60px 20px;color:var(--cinza-texto);display:none}
  .empty.visivel{display:block}
  .empty-icon{font-size:48px;margin-bottom:12px}
  .empty h3{font-size:18px;color:var(--branco);margin-bottom:6px}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--verde);color:var(--preto);padding:12px 20px;border-radius:8px;font-weight:600;font-size:14px;transform:translateY(80px);opacity:0;transition:transform .3s,opacity .3s;z-index:999}
  .toast.show{transform:translateY(0);opacity:1}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .25s}
  .modal-bg.aberto{opacity:1;pointer-events:all}
  .modal{background:var(--cinza-escuro);border:1px solid var(--cinza-borda);border-radius:14px;padding:28px;max-width:380px;width:90%;transform:scale(.92);transition:transform .25s}
  .modal-bg.aberto .modal{transform:scale(1)}
  .modal-img{width:100%;aspect-ratio:1;object-fit:cover;object-position:top center;border-radius:10px;margin-bottom:16px;background:var(--cinza-medio)}
  .modal-nome{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--verde);margin-bottom:4px}
  .modal-clube{font-size:12px;color:var(--cinza-texto);margin-bottom:18px;text-transform:uppercase;letter-spacing:1px}
  .modal-acoes{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .modal-acoes button{padding:11px;border:none;border-radius:7px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;cursor:pointer;transition:opacity .15s}
  .modal-acoes button:hover{opacity:.85}
  .btn-download-modal{background:var(--verde);color:var(--preto)}
  .btn-url-modal{background:var(--cinza-borda);color:var(--branco)}
  .btn-fechar-modal{width:100%;margin-top:10px;padding:10px;background:none;border:1px solid var(--cinza-borda);color:var(--cinza-texto);border-radius:7px;font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;transition:color .15s}
  .btn-fechar-modal:hover{color:var(--branco)}
  .progress-bar-wrap{position:fixed;bottom:0;left:0;right:0;background:var(--cinza-escuro);border-top:1px solid var(--cinza-borda);padding:14px 32px;z-index:300;display:none}
  .progress-bar-wrap.ativo{display:block}
  .progress-label{font-size:12px;color:var(--cinza-texto);margin-bottom:8px;display:flex;justify-content:space-between}
  .progress-label strong{color:var(--verde)}
  .progress-track{height:4px;background:var(--cinza-borda);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:var(--verde);border-radius:2px;transition:width .3s;width:0%}
  @media(max-width:600px){header{padding:14px 16px;gap:10px}.clube-nav{padding:0 16px}main{padding:20px 16px}.grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}}
</style>
</head>
<body>
<header>
  <div class="logo-tcc">TCC<span>Central de Fotos</span></div>
  <div class="header-sep"></div>
  <div class="search-wrapper">
    <input type="text" id="busca" placeholder="Buscar jogador..." autocomplete="off">
    <span class="search-icon">⌕</span>
  </div>
  <div class="header-count"><strong id="contador">0</strong> fotos disponíveis</div>
</header>
<nav class="clube-nav" id="clubeNav"></nav>
<main>
  <div class="status-bar">
    <div class="status-info">Mostrando <strong id="qtd-visivel">0</strong> jogadores <span id="filtro-info"></span></div>
    <button class="btn-baixar-todos" id="btnBaixarTodos">⬇ Baixar Visíveis</button>
  </div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty"><div class="empty-icon">🔍</div><h3>Nenhum jogador encontrado</h3><p>Tente outro nome ou selecione outro clube</p></div>
</main>
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <img src="" alt="" class="modal-img" id="modalImg">
    <div class="modal-nome" id="modalNome"></div>
    <div class="modal-clube" id="modalClube"></div>
    <div class="modal-acoes">
      <button class="btn-download-modal" id="modalBtnDownload">⬇ Baixar</button>
      <button class="btn-url-modal" id="modalBtnURL">🔗 Copiar URL</button>
    </div>
    <button class="btn-fechar-modal" id="modalBtnFechar">Fechar</button>
  </div>
</div>
<div class="progress-bar-wrap" id="progressWrap">
  <div class="progress-label"><span>Baixando fotos em lote...</span><strong id="progressText">0%</strong></div>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
</div>
<div class="toast" id="toast"></div>

const TODOS = [];
for(const [clube,jogadores] of Object.entries(CLUBES)){
  for(const [nome,url] of Object.entries(jogadores)){
    TODOS.push({nome,clube,url});
  }
}

let clubeFiltro='TODOS', buscaAtual='';

function init(){
  document.getElementById('contador').textContent=TODOS.length;
  renderClubeBtns();
  renderGrid();
  document.getElementById('busca').addEventListener('input',e=>{buscaAtual=e.target.value.toLowerCase().trim();renderGrid()});
  document.getElementById('btnBaixarTodos').addEventListener('click',baixarVisiveis);
  document.getElementById('modalBtnFechar').addEventListener('click',fecharModal);
  document.getElementById('modalBg').addEventListener('click',e=>{if(e.target===document.getElementById('modalBg'))fecharModal()});
}

function renderClubeBtns(){
  const nav=document.getElementById('clubeNav');
  const clubes=['TODOS',...Object.keys(CLUBES).sort()];
  nav.innerHTML=clubes.map(c=>`<button class="clube-btn ${c===clubeFiltro?'ativo':''}" onclick="filtrarClube('${c.replace(/'/g,"\'")}')">${c}</button>`).join('');
}

function filtrarClube(clube){clubeFiltro=clube;renderClubeBtns();renderGrid()}

function getVisiveis(){
  return TODOS.filter(j=>{
    const matchClube=clubeFiltro==='TODOS'||j.clube===clubeFiltro;
    const matchBusca=!buscaAtual||j.nome.toLowerCase().includes(buscaAtual)||j.clube.toLowerCase().includes(buscaAtual);
    return matchClube&&matchBusca;
  });
}

function renderGrid(){
  const visiveis=getVisiveis();
  const grid=document.getElementById('grid');
  const empty=document.getElementById('empty');
  document.getElementById('qtd-visivel').textContent=visiveis.length;
  document.getElementById('filtro-info').textContent=clubeFiltro!=='TODOS'?'· '+clubeFiltro:'';
  if(visiveis.length===0){grid.innerHTML='';empty.classList.add('visivel');return}
  empty.classList.remove('visivel');
  grid.innerHTML=visiveis.map(j=>{
    const idx=TODOS.indexOf(j);
    return `<div class="card" onclick="abrirModal(${idx})">
      <div class="card-img-wrap">
        <span class="card-clube-tag">${j.clube}</span>
        <img src="${j.url}" alt="${j.nome}" loading="lazy" onerror="this.style.display='none'">
        <div class="card-overlay">
          <button onclick="event.stopPropagation();baixarFoto('${j.url.replace(/'/g,"\'")}','${j.nome.replace(/'/g,"\'")}')">⬇ Baixar</button>
          <button class="btn-copiar" onclick="event.stopPropagation();copiarURL('${j.url.replace(/'/g,"\'")}')">🔗 URL</button>
        </div>
      </div>
      <div class="card-info">
        <div class="card-nome">${j.nome}</div>
        <div class="card-clube">${j.clube}</div>
      </div>
    </div>`;
  }).join('');
}

function abrirModal(idx){
  const j=TODOS[idx];
  document.getElementById('modalImg').src=j.url;
  document.getElementById('modalNome').textContent=j.nome;
  document.getElementById('modalClube').textContent=j.clube;
  document.getElementById('modalBtnDownload').onclick=()=>baixarFoto(j.url,j.nome);
  document.getElementById('modalBtnURL').onclick=()=>copiarURL(j.url);
  document.getElementById('modalBg').classList.add('aberto');
}

function fecharModal(){document.getElementById('modalBg').classList.remove('aberto')}

async function baixarFoto(url,nome){
  try{
    const ext=url.split('.').pop().split('?')[0]||'jpg';
    const nomeArq=nome.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'')+'.'+ext;
    const resp=await fetch('https://corsproxy.io/?'+encodeURIComponent(url));
    const blob=await resp.blob();
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=nomeArq;
    a.click();
    URL.revokeObjectURL(a.href);
    mostrarToast('✓ '+nome+' baixado!');
  }catch(e){window.open(url,'_blank');mostrarToast('Abrindo em nova aba — salve com Ctrl+S')}
}

async function baixarVisiveis(){
  const visiveis=getVisiveis();
  if(visiveis.length===0)return;
  if(visiveis.length>30){if(!confirm('Baixar '+visiveis.length+' fotos?'))return}
  const wrap=document.getElementById('progressWrap');
  const fill=document.getElementById('progressFill');
  const txt=document.getElementById('progressText');
  wrap.classList.add('ativo');
  let ok=0;
  for(let i=0;i<visiveis.length;i++){
    const j=visiveis[i];
    try{
      const ext=j.url.split('.').pop().split('?')[0]||'jpg';
      const nomeArq=j.clube+'_'+j.nome.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'')+'.'+ext;
      const resp=await fetch('https://corsproxy.io/?'+encodeURIComponent(j.url));
      const blob=await resp.blob();
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download=nomeArq;
      a.click();
      URL.revokeObjectURL(a.href);
      ok++;
    }catch(e){}
    const pct=Math.round(((i+1)/visiveis.length)*100);
    fill.style.width=pct+'%';
    txt.textContent=pct+'%';
    await new Promise(r=>setTimeout(r,400));
  }
  wrap.classList.remove('ativo');
  fill.style.width='0%';
  mostrarToast('✓ '+ok+' fotos baixadas!');
}

function copiarURL(url){
  navigator.clipboard.writeText(url).then(()=>mostrarToast('URL copiada!')).catch(()=>prompt('Copie:',url));
}

function mostrarToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

init();
</script>
